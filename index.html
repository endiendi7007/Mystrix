<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Mystrix · burst & bounce · birthday gift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #f0f3fa 0%, #d9e2f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 60px 60px 30px 30px;
            padding: 25px 25px 35px 25px;
            box-shadow: 0 25px 40px -10px rgba(0, 20, 30, 0.4);
            border: 2px solid rgba(255, 250, 240, 0.7);
        }
        canvas {
            display: block;
            width: 900px;
            height: 600px;
            border-radius: 40px 40px 20px 20px;
            background: #fef9e9;  /* soft cream – lets colors pop */
            box-shadow: inset 0 0 0 2px rgba(255,245,215,0.8), 0 12px 28px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        canvas:active {
            transform: scale(0.99);
        }
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 15px;
            color: #2b3a4a;
            font-weight: 600;
            text-shadow: 2px 2px 0 rgba(255,255,200,0.6);
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .badge {
            background: #ffdab9;
            padding: 8px 28px;
            border-radius: 60px;
            border: 3px solid #fff1d0;
            box-shadow: 0 6px 0 #b38b60;
            color: #4d2e1b;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .badge span {
            display: inline-block;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 0 0 10px gold; }
        }
        .hint {
            background: #f4e5c9;
            border-radius: 50px;
            padding: 6px 20px;
            font-size: 1.1rem;
            border: 2px dashed #9b7b5e;
            color: #3f2e1c;
        }
    </style>
</head>
<body>
<div class="card">
    <canvas id="birthdayCanvas" width="900" height="600"></canvas>
    <div class="info">
        <div class="hint">🎁 click gift → <span id="clickCounter">0</span>/6</div>
        <div class="badge"><span>🎂</span> Mystrix <span>🎈</span></div>
    </div>
</div>
<script>
(function() {
    const canvas = document.getElementById('birthdayCanvas');
    const ctx = canvas.getContext('2d');
    const counterSpan = document.getElementById('clickCounter');

    // ---------- FIXED DIMENSIONS ----------
    const W = 900, H = 600;

    // ---------- GIFT BOX (center stage) ----------
    const gift = {
        x: W/2 - 85,        // left coord
        y: H/2 - 85,
        w: 170,
        h: 170,
        closed: true,
        clickCount: 0,
        threshold: 6,       // 5–6 clicks, we use 6
        bowColor: '#f44e8c',
        boxColor: '#e73b3b',
        ribbonColor: '#fdd835'
    };

    // ---------- GLOBAL PHYSICS PARAMETERS ----------
    const GRAVITY = 0.2;
    const BOUNCE = 0.72;        // a bit lossy, playful
    const BALLOON_LIFT = -0.35;  // upward acceleration (negative y)
    const FRICTION_AIR = 0.995;  // tiny air resistance for spin & velocity

    // ---------- IMAGE ASSETS (local files) ----------
    const imageFiles = ['image1.png', 'image2.png', 'image3.png'];
    let loadedImages = [];
    let imagesReady = false;
    let imagesToLoad = 3;

    // Preload the three images
    imageFiles.forEach((src, idx) => {
        const img = new Image();
        img.src = src;
        img.crossOrigin = 'Anonymous';  // just in case, but local
        img.onload = () => {
            imagesToLoad--;
            if (imagesToLoad === 0) {
                imagesReady = true;
            }
        };
        img.onerror = () => {
            // If image missing, create a coloured canvas substitute (still works locally)
            console.warn(`image ${src} not found, using fallback color rect`);
            const fallbackCanvas = document.createElement('canvas');
            fallbackCanvas.width = 70;
            fallbackCanvas.height = 70;
            const fCtx = fallbackCanvas.getContext('2d');
            fCtx.fillStyle = ['#FF6B6B', '#4ECDC4', '#FFB347'][idx % 3];
            fCtx.fillRect(0, 0, 70, 70);
            fCtx.fillStyle = 'white';
            fCtx.font = 'bold 32px sans-serif';
            fCtx.fillText(['🎁','✨','🎂'][idx], 15, 50);
            const fallbackImg = new Image();
            fallbackImg.src = fallbackCanvas.toDataURL();
            loadedImages[idx] = fallbackImg;
            imagesToLoad--;
            if (imagesToLoad === 0) imagesReady = true;
        };
        loadedImages[idx] = img;
    });

    // ---------- PARTICLE ARRAYS ----------
    let imageParticles = [];     // the 3 main images (burst)
    let balloons = [];
    let confettis = [];
    let bouncingText = null;     // object for "Happy Birthday Mystrix!"

    // ---------- HELPER FUNCTIONS ----------
    function randomRange(min, max) {
        return Math.random() * (max - min) + min;
    }

    // ---------- BURST GENERATORS (called on gift open) ----------
    function generateImageParticles() {
        if (!imagesReady) return; // if images still loading, skip – but we can try later
        const centerX = gift.x + gift.w/2;
        const centerY = gift.y + gift.h/2;
        for (let i = 0; i < 3; i++) {
            if (!loadedImages[i]) continue;
            const angle = randomRange(0, Math.PI * 2);
            const speed = randomRange(4, 8);
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed - 2; // slight upward burst
            const spin = randomRange(-0.12, 0.12);
            // scale image to nice size (60-80px)
            const baseSize = 70;
            imageParticles.push({
                img: loadedImages[i],
                x: centerX,
                y: centerY,
                vx: vx,
                vy: vy,
                width: baseSize,
                height: baseSize,
                angle: randomRange(0, Math.PI*2),
                spin: spin,
                bounceFactor: 0.65
            });
        }
    }

    function generateBalloons(count = 16) {
        const centerX = gift.x + gift.w/2;
        const centerY = gift.y + gift.h/2;
        for (let i = 0; i < count; i++) {
            const angle = randomRange(-0.8, 0.8) + Math.PI/2; // mostly upward
            const speed = randomRange(2, 6);
            const vx = Math.cos(angle) * speed * 0.6;
            const vy = Math.sin(angle) * speed * 1.2 - 2.5; // upward burst
            const radius = randomRange(22, 35);
            const hue = randomRange(0, 360);
            balloons.push({
                x: centerX,
                y: centerY,
                vx: vx,
                vy: vy,
                radius: radius,
                color: `hsl(${hue}, 85%, 65%)`,
                stringY: 0, // will be drawn as line
                lift: BALLOON_LIFT,
                bounce: 0.6
            });
        }
    }

    function generateConfetti(count = 140) {
        const centerX = gift.x + gift.w/2;
        const centerY = gift.y + gift.h/2;
        for (let i = 0; i < count; i++) {
            const angle = randomRange(0, Math.PI*2);
            const speed = randomRange(3, 12);
            const vx = Math.cos(angle) * speed * (Math.random()*0.8+0.5);
            const vy = Math.sin(angle) * speed * (Math.random()*0.8+0.5) - 3;
            const size = randomRange(6, 16);
            confettis.push({
                x: centerX,
                y: centerY,
                vx: vx,
                vy: vy,
                width: size * 0.7,
                height: size * 0.4,
                angle: randomRange(0, Math.PI*2),
                spin: randomRange(-0.15, 0.15),
                color: `hsl(${randomRange(0, 360)}, 95%, 65%)`,
                bounce: 0.55
            });
        }
    }

    function createBouncingText() {
        bouncingText = {
            text: '🎉 Happy Birthday Mystrix! 🎉',
            x: gift.x + gift.w/2,
            y: gift.y + gift.h/2 - 20,
            vx: randomRange(2.5, 4) * (Math.random() > 0.5 ? 1 : -1),
            vy: randomRange(2, 3.5) * (Math.random() > 0.5 ? 1 : -1),
            fontSize: 36,
            color: '#de5b9f',
            stroke: '#fffacd',
            bounce: 0.9
        };
    }

    // ---------- OPEN GIFT (trigger animation) ----------
    function openGift() {
        if (!gift.closed) return;
        gift.closed = false;
        // clear any previous particles (fresh burst)
        imageParticles = [];
        balloons = [];
        confettis = [];
        generateImageParticles();
        generateBalloons(20);   // a bunch of balloons
        generateConfetti(200);  // plenty confetti
        createBouncingText();

        // also add a few 'party popper' fast confetti
        for (let i=0; i<30; i++) {
            const angle = randomRange(0, Math.PI*2);
            const speed = randomRange(7, 18);
            confettis.push({
                x: gift.x + gift.w/2,
                y: gift.y + gift.h/2,
                vx: Math.cos(angle) * speed * 1.4,
                vy: Math.sin(angle) * speed * 1.4 - 2,
                width: 8, height: 5,
                angle: randomRange(0, 2*Math.PI),
                spin: randomRange(-0.25, 0.25),
                color: `hsl(${randomRange(0, 360)}, 95%, 70%)`,
                bounce: 0.5
            });
        }
    }

    // ---------- UPDATE PHYSICS (Euler integration + bounce) ----------
    function updateParticles() {
        // Image particles
        for (let p of imageParticles) {
            // gravity and motion
            p.vy += GRAVITY;
            p.vx *= FRICTION_AIR;
            p.vy *= FRICTION_AIR;
            p.x += p.vx;
            p.y += p.vy;
            p.angle += p.spin;

            const halfW = p.width/2;
            const halfH = p.height/2;

            // edge bounce (rectangle bounds)
            if (p.x - halfW < 0) { p.x = halfW; p.vx = -p.vx * BOUNCE; }
            if (p.x + halfW > W) { p.x = W - halfW; p.vx = -p.vx * BOUNCE; }
            if (p.y - halfH < 0) { p.y = halfH; p.vy = -p.vy * BOUNCE; }
            if (p.y + halfH > H) { p.y = H - halfH; p.vy = -p.vy * BOUNCE; }
        }

        // Balloons (float + lift)
        for (let b of balloons) {
            b.vy += GRAVITY + b.lift;   // lift negative = upward
            b.vx *= FRICTION_AIR;
            b.vy *= FRICTION_AIR;
            b.x += b.vx;
            b.y += b.vy;

            // bounce with radius
            if (b.x - b.radius < 0) { b.x = b.radius; b.vx = -b.vx * BOUNCE; }
            if (b.x + b.radius > W) { b.x = W - b.radius; b.vx = -b.vx * BOUNCE; }
            if (b.y - b.radius < 0) { b.y = b.radius; b.vy = -b.vy * BOUNCE; }
            if (b.y + b.radius > H) { b.y = H - b.radius; b.vy = -b.vy * BOUNCE; }
        }

        // Confetti particles
        for (let c of confettis) {
            c.vy += GRAVITY;
            c.vx *= FRICTION_AIR;
            c.vy *= FRICTION_AIR;
            c.x += c.vx;
            c.y += c.vy;
            c.angle += c.spin;

            const halfW = c.width/2;
            const halfH = c.height/2;

            if (c.x - halfW < 0) { c.x = halfW; c.vx = -c.vx * BOUNCE; c.spin *= 0.9; }
            if (c.x + halfW > W) { c.x = W - halfW; c.vx = -c.vx * BOUNCE; c.spin *= 0.9; }
            if (c.y - halfH < 0) { c.y = halfH; c.vy = -c.vy * BOUNCE; c.spin *= 0.9; }
            if (c.y + halfH > H) { c.y = H - halfH; c.vy = -c.vy * BOUNCE; c.spin *= 0.9; }
        }

        // Bouncing text
        if (bouncingText) {
            bouncingText.x += bouncingText.vx;
            bouncingText.y += bouncingText.vy;
            // text dimensions approx (measure later)
            const approxWidth = bouncingText.text.length * 22; // rough
            const approxHeight = 50;
            if (bouncingText.x - approxWidth/2 < 0) {
                bouncingText.x = approxWidth/2;
                bouncingText.vx = -bouncingText.vx * 0.9;
            }
            if (bouncingText.x + approxWidth/2 > W) {
                bouncingText.x = W - approxWidth/2;
                bouncingText.vx = -bouncingText.vx * 0.9;
            }
            if (bouncingText.y - approxHeight/2 < 0) {
                bouncingText.y = approxHeight/2;
                bouncingText.vy = -bouncingText.vy * 0.9;
            }
            if (bouncingText.y + approxHeight/2 > H) {
                bouncingText.y = H - approxHeight/2;
                bouncingText.vy = -bouncingText.vy * 0.9;
            }
        }
    }

    // ---------- DRAWING ----------
    function drawGiftBox() {
        const { x, y, w, h, closed } = gift;
        // main box
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 5;

        if (closed) {
            // closed gift - bright red
            ctx.fillStyle = gift.boxColor;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 20);
            ctx.fill();

            // ribbon vertical
            ctx.fillStyle = gift.ribbonColor;
            ctx.beginPath();
            ctx.roundRect(x + w/2 - 16, y, 32, h, 10);
            ctx.fill();
            // ribbon horizontal
            ctx.beginPath();
            ctx.roundRect(x, y + h/2 - 16, w, 32, 10);
            ctx.fill();

            // big bow
            ctx.fillStyle = gift.bowColor;
            ctx.beginPath();
            ctx.ellipse(x + w/2 - 30, y - 5, 22, 28, 0.1, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w/2 + 30, y - 5, 22, 28, -0.1, 0, 2*Math.PI);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w/2, y - 10, 25, 0, 2*Math.PI);
            ctx.fillStyle = '#f06292';
            ctx.fill();
        } else {
            // OPEN gift – show interior & tilted lid
            ctx.fillStyle = '#ca6f4b'; // cardboard
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 20);
            ctx.fill();
            // inside darker
            ctx.fillStyle = '#aa6e4a';
            ctx.beginPath();
            ctx.rect(x+10, y+10, w-20, h-20);
            ctx.fill();
            // lid tilted to the side
            ctx.save();
            ctx.translate(x + w/2, y - 12);
            ctx.rotate(-0.15);
            ctx.fillStyle = '#b35e3a';
            ctx.beginPath();
            ctx.rect(-55, -12, w+20, 30);
            ctx.fill();
            ctx.fillStyle = '#f7c56e';
            ctx.beginPath();
            ctx.rect(-40, -18, 20, 20);
            ctx.fill();
            ctx.restore();
        }
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
    }

    // helper for rounded rect
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        return this;
    };

    function drawScene() {
        ctx.clearRect(0, 0, W, H);
        // subtle background pattern
        ctx.fillStyle = '#fef9e9';
        ctx.fillRect(0, 0, W, H);
        // draw stars for whimsy
        ctx.fillStyle = '#ffe9ae';
        for (let i=0; i<15; i++) {
            ctx.beginPath();
            ctx.arc(50 + i*57, 40 + (i%3)*18, 4, 0, 2*Math.PI);
            ctx.fill();
        }

        // draw gift box (if closed or open)
        drawGiftBox();

        // draw all particles
        // confetti first (behind)
        for (let c of confettis) {
            ctx.save();
            ctx.translate(c.x, c.y);
            ctx.rotate(c.angle);
            ctx.fillStyle = c.color;
            ctx.shadowColor = '#b0b0b0';
            ctx.shadowBlur = 8;
            ctx.fillRect(-c.width/2, -c.height/2, c.width, c.height);
            ctx.restore();
        }

        // balloons
        for (let b of balloons) {
            ctx.save();
            ctx.shadowColor = '#907070';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.ellipse(b.x, b.y, b.radius, b.radius*1.1, 0, 0, 2*Math.PI);
            ctx.fillStyle = b.color;
            ctx.fill();
            // string
            ctx.strokeStyle = '#7a5a4a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(b.x - 4, b.y + b.radius-2);
            ctx.lineTo(b.x - 6, b.y + b.radius + 14);
            ctx.stroke();
            ctx.restore();
        }

        // image particles
        for (let p of imageParticles) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            ctx.shadowColor = '#302020';
            ctx.shadowBlur = 12;
            ctx.drawImage(p.img, -p.width/2, -p.height/2, p.width, p.height);
            ctx.restore();
        }

        // bouncing text (if exists)
        if (bouncingText) {
            ctx.save();
            ctx.shadowColor = '#ffb6d9';
            ctx.shadowBlur = 18;
            ctx.font = `bold ${bouncingText.fontSize}px 'Segoe UI', 'Comic Sans MS', cursive, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = bouncingText.stroke;
            ctx.lineWidth = 5;
            ctx.strokeText(bouncingText.text, bouncingText.x, bouncingText.y);
            ctx.fillStyle = bouncingText.color;
            ctx.fillText(bouncingText.text, bouncingText.x, bouncingText.y);
            ctx.restore();
        }

        // if gift closed, show click instruction faintly
        if (gift.closed) {
            ctx.font = 'bold 22px "Segoe UI", cursive';
            ctx.fillStyle = '#93857a';
            ctx.globalAlpha = 0.6;
            ctx.fillText('🔺 click me 5–6 times', gift.x-20, gift.y-25);
            ctx.globalAlpha = 1.0;
        }
    }

    // ---------- CANVAS CLICK HANDLER ----------
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        // check if click inside gift box and gift closed
        if (gift.closed &&
            mouseX >= gift.x && mouseX <= gift.x + gift.w &&
            mouseY >= gift.y && mouseY <= gift.y + gift.h) {

            gift.clickCount++;
            if (gift.clickCount > gift.threshold) gift.clickCount = gift.threshold;
            counterSpan.innerText = gift.clickCount;

            if (gift.clickCount >= gift.threshold) {
                openGift();
            }
        }
    });

    // ---------- ANIMATION LOOP ----------
    function animate() {
        updateParticles();
        drawScene();
        requestAnimationFrame(animate);
    }

    // start everything after a tiny delay (to let images register)
    window.addEventListener('load', () => {
